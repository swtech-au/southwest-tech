<div class="event-card">
  <div class="event-card-date">
    <span class="event-day">{{ include.event.date | date: "%-d" }}</span>
    <span class="event-month">{{ include.event.date | date: "%b" }}</span>
  </div>
  <div class="event-card-body">
    <h3><a href="{{ include.event.rsvp_url | default: include.event.url | relative_url }}"{% if include.event.rsvp_url %} target="_blank" rel="noopener"{% endif %}>{{ include.event.title }}</a></h3>
    {% if include.event.location %}<p class="event-card-location">{{ include.event.location }}</p>{% endif %}
    {% if include.event.excerpt %}<p class="event-card-desc">{{ include.event.excerpt }}</p>{% endif %}
  </div>
</div>
